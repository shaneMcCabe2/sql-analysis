version: 2

models:
  - name: dim_questions
    description: >
      One enriched row per SQL-family question (2020-2022): engagement metrics,
      author reputation, accepted-answer flag, and time-to-first-answer.
    columns:
      - name: question_id
        description: "Question post id (grain)."
        tests: [unique, not_null]
      - name: owner_reputation
        description: "Author reputation at snapshot time (null if author deleted)."
      - name: hours_to_first_answer
        description: "Hours between question and its earliest answer (null if none)."

  - name: fct_tag_yearly
    description: >
      Per-tag, per-year aggregates over the SQL-family question set. Questions
      are exploded across all their tags, so co-occurring tags are included.
    columns:
      - name: tag_year_key
        description: "Surrogate key: '<tag>|<year>' (grain)."
        tests: [unique, not_null]
      - name: tag
        tests: [not_null]
      - name: pct_answered
        description: "Share of questions with >=1 answer (0-1)."
      - name: pct_accepted
        description: "Share of questions with an accepted answer (0-1)."

  - name: analysis_dialect_frequency
    description: >
      Per-dialect, per-year question aggregates. Maps 40+ SQL-family tags to
      12 named dialect families (MySQL, PostgreSQL, SQL Server, Oracle, etc.).
      A question can belong to multiple dialects; each dialect-question pair is
      counted once. Grain: dialect × creation_year.

  - name: analysis_complexity_scores
    description: >
      Per-question SQL complexity score derived from regex detection of 16 SQL
      features in the question body (HTML). Score weights: Basic=1,
      Intermediate=2, Advanced=3, Expert=5, Master=7. Tier labels map score
      ranges to 0-Trivial through 5-Expert buckets. Grain: question_id.
